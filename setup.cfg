[flake8]
max-line-length = 88
extend-ignore = E203, W503

[black]
line-length = 88
skip-string-normalization = true

[isort]
profile = black
line_length = 88

# Validación de Código

## Comandos Básicos

Para validar el código, puedes usar los siguientes comandos en tu terminal:

1. **Flake8**: 
   ```bash
   flake8
   ```

2. **Black**: 
   ```bash
   black .
   ```

3. **isort**: 
   ```bash
   isort .
   ```

## Configuración del Entorno Virtual

Para configurar un entorno virtual, sigue estos pasos:

1. Crea un entorno virtual:
   ```bash
   python -m venv env
   ```

2. Activa el entorno virtual:
   - En Windows:
     ```bash
     .\env\Scripts\activate
     ```
   - En macOS y Linux:
     ```bash
     source env/bin/activate
     ```

3. Instala las herramientas de calidad de código:
   ```bash
   pip install flake8 black isort
   ```

4. (Opcional) Desactiva el entorno virtual cuando termines:
   ```bash
   deactivate
   ```
